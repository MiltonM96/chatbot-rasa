# (Datos de Entrenamiento) :
# * Almacena ejemplos de frases para entrenar los modelos de clasificación.
# * Ayuda al bot a identificar la intención real (*intent*) detrás de diversas formas de escribir.

# -----------------------------------------------------------------------------
version: "3.1"

nlu:
  # 1. Bloque Regex: Extrae cualquier palabra de la A a la Z
  - regex: nombre_personaje
    examples: |
      - [a-zA-Z]+

  # 2. Saludos
  - intent: saludar
    examples: |
      - hola
      - buenas
      - buenas tardes
      - buenas noches
      - buenos días
      - buen día
      - qué tal
      - hey
      - hola, ¿cómo estás?
      - hola bot
      - hola dragon ball bot
      - buenas, necesito ayuda
      - hola, quiero consultar algo

  # 3. Plantillas de oraciones (Se incluyen búsquedas genéricas y por atributo)
  - intent: buscar_personaje
    examples: |
      - buscame información de [Goku](nombre_personaje)
      - ¿quién es [Vegeta](nombre_personaje)?
      - ¿quien es [Yamcha](nombre_personaje)?
      - ¿cuánto [ki](atributo) tiene [Goku](nombre_personaje)?
      - decime la [raza](atributo) de [Vegeta](nombre_personaje)
      - ¿cuál es el [género](atributo) de [Freezer](nombre_personaje)?
      - mostrame la [afiliación](atributo) de [Krillin](nombre_personaje)
      - que [raza](atributo) tiene [piccolo](nombre_personaje)
      - el personaje [piccolo](nombre_personaje) de que [raza](atributo) es?
      - decime el [ki](atributo) de [Trunks](nombre_personaje)
      - que [transformaciones](atributo) tiene [goku](nombre_personaje)
      - decime las [transformaciones](atributo) de [Vegeta](nombre_personaje)
      - cual es la [ultima transformacion](atributo) de [goku](nombre_personaje)
      - mostrame la [última transformación](atributo) de [Freezer](nombre_personaje)
      - cuales son las [transformaciones](atributo) de [bulma](nombre_personaje)

  # 4. Mensajes fuera de tema (no relacionados con la API)
  - intent: chitchat
    examples: |
      - ¿cómo estás?
      - contame un chiste
      - hace calor hoy
      - ¿sos un robot?
      - háblame de naves espaciales
      - ¿cuántos capítulos tiene la serie?
      - quiero ver el resumen del episodio uno
      - cuánto sale una pizza
      - qué hora es
      - me ayudas con la tarea de matemáticas
      - quién ganó el mundial
      - hablame del clima
      - cuál es tu color favorito
      - sabés programar en python
      - cuánto es 2 + 2
      - me aburro
      - decime algo gracioso
      - jugamos un juego
      - qué opinás de naruto
      - contame algo interesante
      - tengo hambre
      - me recomendás una película
      - a qué te dedicas
      - esto es una prueba
      - estoy probando el chat
      - aaaa
      - asdf
      - jajaja
      - ???
      - no entiendo nada
      - qwerty
      - blablabla
      - test
      - lalala
      - xd
      - lol