# (Lógica Invariable) :
# * Establece reglas rígidas que fuerzan acciones específicas ante condiciones exactas.
# * Se utiliza para flujos que no requieren predicción estadística, como el *chit-chat* o la inactividad.

# -----------------------------------------------------------------------------

# rule: Nombre descriptivo de la regla. Solo sirve para lectura y depuración del desarrollador; no afecta al modelo.
# steps: Lista secuencial y obligatoria de eventos que conforman la regla.
# intent: Es el evento detonante. Representa la clasificación final que el motor NLU hizo sobre el texto del usuario.
# action: Es la respuesta del sistema. Puede ser un mensaje estático (utter_...), la ejecución de código en Python (action_consultar_dragonball), o un comando interno del núcleo (action_session_start para borrar la memoria).

version: "3.1"

rules:
  - rule: Saludo inicial
    steps:
      - intent: saludar
      - action: utter_bienvenida
      - action: action_programar_inactividad

  - rule: Consultar API de Dragon Ball y reiniciar timer
    steps:
      - intent: buscar_personaje
      - action: action_consultar_dragonball
      - action: action_programar_inactividad

  - rule: Manejar interrupciones y reiniciar timer
    steps:
      - intent: chitchat
      - action: utter_chitchat
      - action: action_programar_inactividad

  - rule: Consulta no entendida y reiniciar timer
    steps:
      - intent: nlu_fallback
      - action: utter_fallback
      - action: action_programar_inactividad

  - rule: Cerrar sesión por inactividad
    steps:
      - intent: EXTERNAL_no_input
      - action: utter_despedida_inactividad
      - action: action_session_start