# (Registro de Componentes) :
# * Funciona como el inventario central o manifiesto del sistema.
# * Declara intenciones, acciones y plantillas de respuesta (*utterances*) que el bot puede utilizar.

# -----------------------------------------------------------------------------

version: "3.1"

# 1. Registrar intenciones
intents:
  - buscar_personaje
  - chitchat
  - EXTERNAL_no_input

# 2. Registrar etiquetas de extracción
entities:
  - nombre_personaje
  - atributo

# 3. Configurar memoria (Slots)
slots:
  nombre_personaje:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: nombre_personaje
  atributo:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: atributo

# 4. Respuestas estáticas
responses:
  utter_chitchat:
    - text: "Solo soy un bot enfocado en mi tarea. ¿Podemos volver a los datos de la API?"
  
  utter_despedida_inactividad:
    - text: "Debido a la falta de respuesta por 60 segundos, cerraré la conversación. ¡Hasta pronto!"

# 5. Listado de lógica personalizada
actions:
  - action_consultar_dragonball
  - action_programar_inactividad