version: "3.1"

intents:
  - greet
  - ask_weather
  - inform_city
  - chitchat
  - goodbye

responses:
  utter_greet:
    - text: "Hola! Soy un chatbot de clima. ¿Qué ciudad querés consultar?"

  utter_ask_city:
    - text: "Decime la ciudad para consultar el clima."

  utter_goodbye:
    - text: "Chau! Cuando quieras volvemos a hablar."

  utter_chitchat:
    - text: "Puedo charlar 😄 pero mi función principal es decirte el clima. ¿Qué ciudad querés?"

  utter_out_of_scope:
    - text: "Por ahora solo puedo ayudarte con el clima."

actions:
  - action_get_weather

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true