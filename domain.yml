# (Registro de Componentes) :
# * Funciona como el inventario central o manifiesto del sistema.
# * Declara intenciones, acciones y plantillas de respuesta (*utterances*) que el bot puede utilizar.

# -----------------------------------------------------------------------------

version: "3.1"

# 1. Registrar intenciones
intents:
  - saludar
  - buscar_personaje
  - chitchat
  - nlu_fallback
  - EXTERNAL_no_input

# 2. Registrar etiquetas de extracción
entities:
  - nombre_personaje
  - atributo

# 3. Configurar memoria (Slots)
slots:
  nombre_personaje:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: nombre_personaje
  atributo:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: atributo

# 4. Respuestas estáticas
responses:
  utter_bienvenida:
    - text: "¡Hola! Soy el bot de Dragon Ball 🐲. Preguntame sobre personajes, transformaciones, ki, raza y más."

  utter_chitchat:
    - text: "Soy un bot enfocado en Dragon Ball, no tengo información sobre temas generales. ¿Te puedo ayudar con alguna consulta sobre la API?"
  
  utter_fallback:
    - text: "No logré entender tu consulta. Probá preguntándome algo como: '¿cuál es el ki de Goku?' o 'decime las transformaciones de Vegeta'."

  utter_despedida_inactividad:
    - text: "Debido a la falta de respuesta por 10 Segundos, cerraré la conversación. ¡Hasta pronto!"

# 5. Listado de lógica personalizada
actions:
  - action_consultar_dragonball
  - action_programar_inactividad