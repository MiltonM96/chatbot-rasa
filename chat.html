<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Ball Chatbot - Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      background: #1a1a2e;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 85vh;
      border: 1px solid rgba(255, 165, 0, 0.15);
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 165, 0, 0.15);
    }

    .chat-header .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #ff8c00, #ff6600);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header .info h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .chat-header .info .status {
      font-size: 12px;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-header .info .status::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 165, 0, 0.3); border-radius: 10px; }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid rgba(255, 165, 0, 0.12);
      border-bottom-left-radius: 4px;
      color: #e0e0e0;
    }

    .message.bot.reminder {
      background: linear-gradient(135deg, #2d1810, #1a1028);
      border: 1px solid rgba(255, 100, 0, 0.35);
      color: #ff9a5c;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff8c00, #e67600);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .message .time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 6px;
      display: block;
    }

    .typing {
      align-self: flex-start;
      padding: 12px 20px;
      background: #16213e;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: rgba(255, 165, 0, 0.5);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Input */
    .chat-input {
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid rgba(255, 165, 0, 0.15);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid rgba(255, 165, 0, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .chat-input input:focus {
      border-color: rgba(255, 165, 0, 0.5);
    }

    .chat-input input::placeholder { color: #666; }

    .chat-input button {
      background: linear-gradient(135deg, #ff8c00, #e67600);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .chat-input button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
    }

    .chat-input button svg {
      fill: #fff;
      width: 20px;
      height: 20px;
    }

    /* Timer bar */
    .timer-bar {
      padding: 8px 20px;
      background: #12121f;
      border-top: 1px solid rgba(255,165,0,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #888;
    }

    .timer-bar .progress {
      flex: 1;
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .timer-bar .progress .fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #ff8c00, #ef4444);
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }

    .timer-bar.inactive { display: none; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🐉</div>
      <div class="info">
        <h2>Dragon Ball Bot</h2>
        <div class="status">En línea</div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
    </div>

    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>

    <div class="timer-bar inactive" id="timerBar">
      <span>⏱ Inactividad</span>
      <div class="progress"><div class="fill" id="timerFill"></div></div>
      <span id="timerText">0s</span>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Escribí tu mensaje..." autocomplete="off">
      <button id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const RASA_URL = 'http://localhost:5005';
    const SENDER_ID = 'chat_web_' + Date.now();
    const INACTIVITY_SECONDS = 10; // Mismo valor que en actions.py

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typing');
    const timerBar = document.getElementById('timerBar');
    const timerFill = document.getElementById('timerFill');
    const timerText = document.getElementById('timerText');

    let lastEventCount = 0;
    let pollingInterval = null;
    let timerInterval = null;
    let timerStart = null;

    function getTime() {
      return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addMessage(text, type, isReminder = false) {
      const div = document.createElement('div');
      div.className = `message ${type}${isReminder ? ' reminder' : ''}`;
      div.innerHTML = `${isReminder ? '⚠️ ' : ''}${text}<span class="time">${getTime()}</span>`;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function showTyping(show) {
      typingEl.style.display = show ? 'block' : 'none';
      if (show) scrollToBottom();
    }

    // --- Timer visual ---
    function startTimerVisual() {
      timerBar.classList.remove('inactive');
      timerStart = Date.now();
      timerFill.style.width = '0%';

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - timerStart) / 1000;
        const pct = Math.min((elapsed / INACTIVITY_SECONDS) * 100, 100);
        timerFill.style.width = pct + '%';
        timerText.textContent = Math.floor(elapsed) + 's';

        if (elapsed >= INACTIVITY_SECONDS) {
          clearInterval(timerInterval);
          timerText.textContent = '¡Tiempo!';
        }
      }, 200);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerBar.classList.add('inactive');
      timerFill.style.width = '0%';
    }

    // --- Polling para detectar mensajes del reminder ---
    function startPolling() {
      stopPolling();
      pollingInterval = setInterval(async () => {
        try {
          const res = await fetch(`${RASA_URL}/conversations/${SENDER_ID}/tracker`);
          const tracker = await res.json();
          const events = tracker.events || [];

          // Buscar eventos bot nuevos desde el último check
          if (events.length > lastEventCount) {
            const newEvents = events.slice(lastEventCount);
            for (const evt of newEvents) {
              if (evt.event === 'bot' && evt.text) {
                // Verificar si es el mensaje de inactividad
                const isReminder = evt.text.includes('inactividad') || evt.text.includes('falta de respuesta');
                addMessage(evt.text, 'bot', isReminder);
                if (isReminder) {
                  stopTimer();
                  stopPolling();
                }
              }
            }
            lastEventCount = events.length;
          }
        } catch (e) {
          // Silenciar errores de polling
        }
      }, 1000);
    }

    function stopPolling() {
      clearInterval(pollingInterval);
    }

    // --- Enviar mensaje ---
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';
      showTyping(true);
      stopTimer();
      stopPolling();
      clearTimeout(welcomeTimeout);
      welcomeTimeout = null;

      try {
        const res = await fetch(`${RASA_URL}/webhooks/rest/webhook`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender: SENDER_ID, message: text })
        });

        const data = await res.json();
        showTyping(false);

        if (data && data.length > 0) {
          for (const msg of data) {
            if (msg.text) {
              // Filtrar mensajes de inactividad del webhook (se muestran solo por polling)
              const esInactividad = msg.text.includes('inactividad') || msg.text.includes('falta de respuesta');
              if (!esInactividad) {
                addMessage(msg.text, 'bot');
              }
            }
          }
        }

        // Esperar 2 segundos para que cualquier reminder pendiente se procese en Rasa
        // antes de sincronizar (evita race condition entre API call y reminder viejo)
        await new Promise(resolve => setTimeout(resolve, 2000));

        // Actualizar el conteo de eventos para que el polling no duplique
        const trackerRes = await fetch(`${RASA_URL}/conversations/${SENDER_ID}/tracker`);
        const tracker = await trackerRes.json();
        lastEventCount = (tracker.events || []).length;

        // Iniciar timer visual y polling
        startTimerVisual();
        startPolling();

      } catch (e) {
        showTyping(false);
        addMessage('Error de conexión con el servidor Rasa. ¿Está corriendo?', 'bot', true);
      }
    }

    // --- Timer de bienvenida (solo frontend, sin Rasa) ---
    let welcomeTimeout = null;

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // --- Inicializar chat: enviar saludo automático al cargar ---
    async function initChat() {
      showTyping(true);
      try {
        const res = await fetch(`${RASA_URL}/webhooks/rest/webhook`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender: SENDER_ID, message: '/saludar' })
        });
        const data = await res.json();
        showTyping(false);
        if (data && data.length > 0) {
          for (const msg of data) {
            if (msg.text) addMessage(msg.text, 'bot');
          }
        }
        // Sincronizar eventos (sin polling, el timer de bienvenida es solo frontend)
        const trackerRes = await fetch(`${RASA_URL}/conversations/${SENDER_ID}/tracker`);
        const tracker = await trackerRes.json();
        lastEventCount = (tracker.events || []).length;

        // Timer visual + timeout frontend para inactividad en la bienvenida
        startTimerVisual();
        welcomeTimeout = setTimeout(() => {
          stopTimer();
          addMessage('Debido a la falta de respuesta por ' + INACTIVITY_SECONDS + ' Segundos, cerraré la conversación. ¡Hasta pronto!', 'bot', true);
        }, INACTIVITY_SECONDS * 1000);
      } catch (e) {
        showTyping(false);
        addMessage('Error de conexión con el servidor Rasa. ¿Está corriendo?', 'bot', true);
      }
    }

    initChat();
    userInput.focus();
  </script>
</body>
</html>
